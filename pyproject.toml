[tool.black]
line-length = 79

[tool.pyright]
typeCheckingMode = "strict"
include = ["app"]
exclude = ["**/node_modules", "**/__pycache__", "typeshed"]
stubPath = "typeshed"
venvPath = "./venv/"

reportMissingImports = true
reportMissingTypeStubs = false

pythonVersion = "3.13"
pythonPlatform = "linux"

executionEnvironments = [{ "root" = "." }]

[tool.ruff]
line-length = 79
target-version = "py313"

[tool.ruff.lint]
ignore = []

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.bandit]
exclude_dirs = ["tests", "venv"]
